version: '3.8'
services:
  web:
    build: .
    image: the_blue_wardrobe_web:latest
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: bluewardrobe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data:
